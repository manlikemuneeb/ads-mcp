name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck and build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint
        continue-on-error: true

  pack-plugin:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm run pack:plugin
      - uses: actions/upload-artifact@v4
        with:
          name: ads-mcp-plugin
          path: release/ads-mcp.plugin
          retention-days: 30
