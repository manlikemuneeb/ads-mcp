name: Publish

# Triggers on a tag push matching v*.*.* (e.g. v0.1.1).
# Publishes every public workspace package to npm under @manlikemuneeb/ads-mcp-*
# and uploads the .plugin bundle as a GitHub release asset.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # NOTE: registry-url intentionally omitted. With OIDC trusted publishing
          # we don't want setup-node writing an .npmrc that templates a token —
          # an empty token line confuses npm into token-mode and skips OIDC.

      - name: Install
        # Uses the system npm (10.x in Node 22's tool cache) for install — this
        # works fine; OIDC trusted publishing is only needed for the publish step.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          ROOT_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$TAG_VERSION" != "$ROOT_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $ROOT_VERSION"
            exit 1
          fi
          echo "Releasing v$ROOT_VERSION"

      - name: Diagnostic — confirm OIDC env is exposed and no token leaks
        run: |
          echo "== system npm =="
          which npm
          npm --version
          echo ""
          echo "== OIDC env present? (presence only, no values) =="
          [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]   && echo "ACTIONS_ID_TOKEN_REQUEST_URL: SET"   || echo "ACTIONS_ID_TOKEN_REQUEST_URL: MISSING"
          [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ] && echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: SET" || echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: MISSING"
          echo ""
          echo "== auth-related env that should NOT be set =="
          [ -n "$NPM_TOKEN" ]       && echo "WARN: NPM_TOKEN is set"       || echo "NPM_TOKEN: unset (good)"
          [ -n "$NODE_AUTH_TOKEN" ] && echo "WARN: NODE_AUTH_TOKEN is set" || echo "NODE_AUTH_TOKEN: unset (good)"
          echo ""
          echo "== .npmrc files =="
          ls -la ~/.npmrc 2>&1 || echo "no ~/.npmrc (good)"
          ls -la .npmrc 2>&1   || echo "no project .npmrc"
          if [ -f ~/.npmrc ]; then
            echo "--- ~/.npmrc contents ---"
            cat ~/.npmrc
          fi

      - name: Force-clear any stale .npmrc that could disable OIDC
        run: |
          rm -f ~/.npmrc .npmrc
          echo "Cleared all .npmrc files"

      - name: Publish workspace packages (OIDC Trusted Publishing)
        # OIDC is auto-detected via ACTIONS_ID_TOKEN_REQUEST_* env vars exposed
        # by GitHub Actions when the workflow has `permissions: id-token: write`.
        # Requires each package to have a trusted publisher configured on
        # npmjs.com pointing at this repo + workflow filename `publish.yml`.
        #
        # Use `npx -y npm@latest publish` to run npm >= 11.5.1 (required for
        # OIDC trusted publishing). The system npm (10.x in Node 22's tool cache)
        # is too old AND has a known broken module dep that breaks `npm install -g npm@latest`.
        # `npx` downloads npm@latest fresh into an isolated tmp dir and runs it.
        run: |
          echo "Running publish with npm@latest via npx..."
          npx -y npm@latest --version
          npx -y npm@latest publish --workspaces --access public --provenance

      - name: Pack .plugin
        run: npm run pack:plugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ads-mcp.plugin
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](./CHANGELOG.md) for full release notes.

            ## Install (recommended: npm + config-file)

            ```bash
            npm install -g @manlikemuneeb/ads-mcp-cli
            ads-mcp setup --oauth meta   # or linkedin / google
            ```

            Then add to your AI client's MCP config:

            ```json
            {
              "mcpServers": {
                "ads-mcp": {
                  "command": "npx",
                  "args": ["-y", "@manlikemuneeb/ads-mcp-server"]
                }
              }
            }
            ```

            **Per-client guides:** [Claude Desktop](./docs/install/claude-desktop.md) · [Claude Code](./docs/install/claude-code.md) · [Cursor](./docs/install/cursor.md) · [Cline](./docs/install/cline.md) · [Continue](./docs/install/continue.md)

            **Fallback `.plugin` bundle** (for clients with a working plugin uploader): download `ads-mcp.plugin` below. As of v0.2.0, Claude Desktop's plugin upload UI rejects bundles inconsistently — use the npm + config-file path above instead.
